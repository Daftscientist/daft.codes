<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>/terminal | Daft.</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --onyx: #151515;
      --charcoal: #4c4c4b;
      --charcoal2: #484849;
      --silver: #bdbcbd;
      --white: #fefefe;
      --green: #6aaa7a;
      --blue: #8a8aff;
      --red: #d48a8a;
      --yellow: #c9a84c;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      line-height: 1.7;
      background: var(--onyx);
      color: var(--silver);
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99999;
      opacity: 0.02;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    ::selection { background: var(--charcoal2); color: var(--white); }

    .terminal {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    .term-chrome {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(76,76,75,0.15);
      flex-shrink: 0;
    }
    .cd { width: 12px; height: 12px; border-radius: 50%; }
    .cd-r { background: #ff5f57; }
    .cd-y { background: #febc2e; }
    .cd-g { background: #28c840; }
    .term-title {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: var(--charcoal);
      letter-spacing: 0.5px;
    }
    .term-back {
      font-size: 12px;
      color: var(--charcoal);
      text-decoration: none;
      transition: color .2s;
    }
    .term-back:hover { color: var(--white); }

    .term-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      scroll-behavior: smooth;
    }
    .term-body::-webkit-scrollbar { width: 4px; }
    .term-body::-webkit-scrollbar-track { background: transparent; }
    .term-body::-webkit-scrollbar-thumb { background: var(--charcoal); border-radius: 2px; }

    .line { white-space: pre-wrap; word-break: break-word; }
    .line-cmd { color: var(--white); }
    .line-out { color: var(--silver); }
    .line-err { color: var(--red); }
    .line-heading { color: var(--white); font-weight: 700; }
    .line-muted { color: var(--charcoal); }
    .line-link { color: var(--blue); cursor: pointer; }
    .line-link:hover { text-decoration: underline; }

    .term-input-row {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      border-top: 1px solid rgba(76,76,75,0.15);
      flex-shrink: 0;
      gap: 0;
    }
    .input-prompt { color: var(--green); white-space: nowrap; user-select: none; }
    .input-path { color: var(--blue); white-space: nowrap; user-select: none; }
    .input-sep { color: var(--charcoal); margin: 0 6px 0 4px; user-select: none; }
    #cmdInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--white);
      caret-color: var(--white);
    }
    #cmdInput::placeholder { color: var(--charcoal); }

    #matrix {
      position: fixed;
      inset: 0;
      z-index: 99998;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }
    #matrix.active { opacity: 1; }

    @media (max-width: 600px) {
      body { font-size: 12px; }
      .term-chrome { padding: 10px 14px; }
      .term-body { padding: 14px; }
      .term-input-row { padding: 10px 14px; }
    }
  </style>
</head>
<body>
<canvas id="matrix"></canvas>
<div class="terminal">
  <div class="term-chrome">
    <span class="cd cd-r"></span>
    <span class="cd cd-y"></span>
    <span class="cd cd-g"></span>
    <span class="term-title">leo@daftscientist.dev — zsh</span>
    <a href="index.html" class="term-back">exit</a>
  </div>
  <div class="term-body" id="output"></div>
  <div class="term-input-row">
    <span class="input-prompt">leo</span>
    <span class="input-sep">:</span>
    <span class="input-path">~/daftscientist.dev</span>
    <span class="input-sep">$</span>
    <input type="text" id="cmdInput" autofocus spellcheck="false" placeholder="type help to get started">
  </div>
</div>

<script>
/* Terminal — daftscientist.dev/terminal
   This is a STATIC portfolio page with a fake CLI interface.
   All content is hardcoded — no user-generated content is rendered unsafely.
   innerHTML is only used for: clearing output, and rendering the prompt
   with pre-escaped static text via escapeHtml(). */

var output = document.getElementById('output');
var cmdInput = document.getElementById('cmdInput');
var cmdHistory = [];
var histIdx = -1;

var filesystem = {
  'about.txt': [
    'Leo Johnston Mesia',
    '==================',
    '',
    'Software engineer from England. Half Peruvian, bilingual in',
    'English and Spanish. Currently finishing A-Levels in Computer',
    'Science, Modern History, Spanish, and Core Maths.',
    '',
    'I build full-stack systems, break things on purpose, and write',
    'too much documentation. I think in architectures, not features.',
    '',
    'Strong: Python, TypeScript, React, FastAPI, Docker',
    'Learning: Rust, C++',
    'Also used: Go, PHP, Ruby, Bash',
  ],
  'projects/': {
    'nea.txt': [
      'Workforce Management & Pay Tracking',
      '====================================',
      'A-Level CS NEA. Full HR & scheduling system for SMBs.',
      'Employee scheduling, attendance, role-based access, payroll.',
      '100k+ word write-up. My proudest piece of work.',
      '',
      'Stack: React, Python, FastAPI, SQLAlchemy, JWT',
    ],
    'webscene.txt': [
      'WebScene',
      '========',
      'TypeScript Canvas video composition engine.',
      'After Effects-style timeline with layers, tracks, keyframes.',
      'Deterministic rendering and frame export.',
      '',
      'Stack: TypeScript, Canvas API, WebCodecs',
    ],
    'jrni.txt': [
      'JRNI Demo',
      '=========',
      'Booking system API integration built during work experience',
      'at bookinglab. React frontend consuming the JRNI scheduling API.',
      '',
      'Stack: TypeScript, React, JRNI API',
    ],
    'cascade.txt': [
      'Cascade',
      '=======',
      'SaaS hosting platform replacing the WHMCS/Pterodactyl/cPanel stack.',
      'Zero-trust architecture with mTLS, signed actions, data sovereignty.',
      'Built on Incus (KVM VMs, LXC, OCI containers) with OVN networking.',
      '',
      'Website: usecascade.io',
      'Stack: TypeScript, Rust, Incus, OVN',
    ],
  },
  'contact/': {
    'links.txt': [
      'Contact & Links',
      '===============',
      '',
      'Email    leo@daftscientist.dev',
      'GitHub   github.com/daftscientist',
      'LinkedIn linkedin.com/in/leo-johnston',
      'Website  daftscientist.dev',
    ],
  },
};

var commandHandlers = {
  help: function() {
    return [
      { type: 'heading', text: 'Available commands' },
      { type: 'out', text: '' },
      { type: 'out', text: '  help             show this message' },
      { type: 'out', text: '  whoami           who am i' },
      { type: 'out', text: '  pwd              print working directory' },
      { type: 'out', text: '  ls [dir]         list files' },
      { type: 'out', text: '  cat <file>       read a file' },
      { type: 'out', text: '  clear            clear the terminal' },
      { type: 'out', text: '  history          command history' },
      { type: 'out', text: '  neofetch         system info' },
      { type: 'out', text: '  date             current date/time' },
      { type: 'out', text: '  exit             back to portfolio' },
      { type: 'out', text: '' },
      { type: 'muted', text: '  ...try other things too. some might surprise you.' },
    ];
  },

  whoami: function() { return [{ type: 'out', text: 'leo' }]; },
  pwd: function() { return [{ type: 'out', text: '~/daftscientist.dev' }]; },

  ls: function(args) {
    var target = args[0];
    if (!target) {
      return Object.keys(filesystem).map(function(k) {
        return { type: 'out', text: '  ' + k };
      });
    }
    var dirKey = target.replace(/\/$/, '') + '/';
    if (filesystem[dirKey] && typeof filesystem[dirKey] === 'object') {
      return Object.keys(filesystem[dirKey]).map(function(k) {
        return { type: 'out', text: '  ' + k };
      });
    }
    return [{ type: 'err', text: "ls: cannot access '" + target + "': No such file or directory" }];
  },

  cat: function(args) {
    if (!args.length) return [{ type: 'err', text: 'cat: missing file operand' }];
    var path = args[0].replace(/^\.\//, '');

    if (filesystem[path] && Array.isArray(filesystem[path])) {
      return filesystem[path].map(function(l) { return { type: 'out', text: l }; });
    }

    var parts = path.split('/');
    if (parts.length === 2) {
      var dirKey = parts[0] + '/';
      var file = parts[1];
      if (filesystem[dirKey] && filesystem[dirKey][file]) {
        return filesystem[dirKey][file].map(function(l) { return { type: 'out', text: l }; });
      }
    }

    var testDir = path.replace(/\/$/, '') + '/';
    if (filesystem[testDir]) {
      return [{ type: 'err', text: 'cat: ' + path + ': Is a directory' }];
    }

    return [{ type: 'err', text: 'cat: ' + path + ': No such file or directory' }];
  },

  clear: function() {
    while (output.firstChild) output.removeChild(output.firstChild);
    return [];
  },

  history: function() {
    return cmdHistory.map(function(cmd, i) {
      return { type: 'out', text: '  ' + String(i + 1).padStart(4) + '  ' + cmd };
    });
  },

  exit: function() {
    window.location.href = 'index.html';
    return [{ type: 'muted', text: 'Redirecting...' }];
  },

  sudo: function(args) {
    var full = args.join(' ');
    if (full.indexOf('rm -rf /') === 0 || full.indexOf('rm -rf /*') === 0) {
      return [
        { type: 'out', text: '' },
        { type: 'err', text: '  Deleting the entire filesystem...' },
        { type: 'err', text: '  Just kidding. Nice try though.' },
        { type: 'out', text: '' },
      ];
    }
    return [{ type: 'err', text: "sudo: operation not permitted (you're not root here)" }];
  },

  hola: function() {
    return [
      { type: 'out', text: 'Hola! Hablas espanol?' },
      { type: 'muted', text: 'Leo is bilingual in English and Spanish.' },
    ];
  },

  cascade: function() {
    return [
      { type: 'heading', text: 'Cascade' },
      { type: 'out', text: '' },
      { type: 'out', text: 'SaaS hosting platform. Currently building.' },
      { type: 'out', text: 'Zero-trust, mTLS, signed actions, data sovereignty.' },
      { type: 'out', text: '' },
      { type: 'link', text: 'usecascade.io', url: 'https://usecascade.io' },
    ];
  },

  neofetch: function() {
    return [
      { type: 'out', text: '' },
      { type: 'heading', text: '  daft.' },
      { type: 'out', text: '  -----' },
      { type: 'out', text: '  OS: daftOS v' + new Date().getFullYear() },
      { type: 'out', text: '  Host: daftscientist.dev' },
      { type: 'out', text: '  Shell: zsh (fake)' },
      { type: 'out', text: '  Languages: English, Spanish' },
      { type: 'out', text: '  Stack: Python, TypeScript, React, Rust' },
      { type: 'out', text: '  Uptime: since 2006' },
      { type: 'out', text: '  Theme: dark (always)' },
      { type: 'out', text: '' },
    ];
  },

  date: function() { return [{ type: 'out', text: new Date().toString() }]; },
  echo: function(args) { return [{ type: 'out', text: args.join(' ') }]; },

  ping: function(args) {
    if (!args.length) return [{ type: 'err', text: 'ping: missing host operand' }];
    return [
      { type: 'out', text: 'PING ' + args[0] + ': 64 bytes, time=0.42ms' },
      { type: 'out', text: 'PING ' + args[0] + ': 64 bytes, time=0.38ms' },
      { type: 'out', text: 'PING ' + args[0] + ': 64 bytes, time=0.41ms' },
      { type: 'muted', text: "--- (it's a fake terminal, what did you expect)" },
    ];
  },

  cd: function(args) {
    if (!args.length || args[0] === '~' || args[0] === '/') {
      return [{ type: 'muted', text: "You're already home." }];
    }
    return [{ type: 'muted', text: 'Nice try, but this filesystem is read-only.' }];
  },

  rm: function() { return [{ type: 'err', text: 'rm: permission denied (this is a portfolio, not a playground)' }]; },
  mkdir: function() { return [{ type: 'err', text: 'mkdir: read-only filesystem' }]; },
  touch: function() { return [{ type: 'err', text: 'touch: read-only filesystem' }]; },
  vim: function() { return [{ type: 'muted', text: 'Good luck exiting.' }]; },
  nano: function() { return [{ type: 'muted', text: 'The filesystem is read-only. Use cat instead.' }]; },
  npm: function() { return [{ type: 'muted', text: 'node_modules would weigh more than this entire site.' }]; },

  coffee: function() {
    return [
      { type: 'out', text: '' },
      { type: 'out', text: '  ( (  ' },
      { type: 'out', text: '   ) )' },
      { type: 'out', text: ' ._____.  ' },
      { type: 'out', text: ' |     |]' },
      { type: 'out', text: ' \\     / ' },
      { type: 'out', text: "  `---' " },
      { type: 'out', text: '' },
      { type: 'muted', text: 'Leo runs on coffee. This is documented.' },
    ];
  },

  matrix: function() {
    startMatrix();
    return [{ type: 'muted', text: 'Entering the matrix... (click anywhere to stop)' }];
  },
};

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function createPromptLine(text) {
  var div = document.createElement('div');
  div.classList.add('line', 'line-cmd');

  var prompt = document.createElement('span');
  prompt.style.color = 'var(--green)';
  prompt.textContent = 'leo';
  div.appendChild(prompt);

  var sep1 = document.createElement('span');
  sep1.style.color = 'var(--charcoal)';
  sep1.textContent = ':';
  div.appendChild(sep1);

  var path = document.createElement('span');
  path.style.color = 'var(--blue)';
  path.textContent = '~/daftscientist.dev';
  div.appendChild(path);

  var sep2 = document.createElement('span');
  sep2.style.color = 'var(--charcoal)';
  sep2.textContent = ' $ ';
  div.appendChild(sep2);

  var cmdText = document.createTextNode(text);
  div.appendChild(cmdText);

  return div;
}

function addLines(lines) {
  lines.forEach(function(l) {
    var div;
    if (l.type === 'cmd') {
      div = createPromptLine(l.text);
    } else {
      div = document.createElement('div');
      div.classList.add('line');
      if (l.type === 'out') {
        div.classList.add('line-out');
        div.textContent = l.text;
      } else if (l.type === 'err') {
        div.classList.add('line-err');
        div.textContent = l.text;
      } else if (l.type === 'heading') {
        div.classList.add('line-heading');
        div.textContent = l.text;
      } else if (l.type === 'muted') {
        div.classList.add('line-muted');
        div.textContent = l.text;
      } else if (l.type === 'link') {
        div.classList.add('line-link');
        div.textContent = l.text;
        div.addEventListener('click', function() { window.open(l.url, '_blank'); });
      }
    }
    output.appendChild(div);
  });
  output.scrollTop = output.scrollHeight;
}

function runCommand(raw) {
  var trimmed = raw.trim();
  if (!trimmed) return;

  cmdHistory.push(trimmed);
  histIdx = cmdHistory.length;

  addLines([{ type: 'cmd', text: trimmed }]);

  var parts = trimmed.split(/\s+/);
  var cmd = parts[0].toLowerCase();
  var args = parts.slice(1);

  if (commandHandlers[cmd]) {
    var result = commandHandlers[cmd](args);
    if (result.length) addLines(result);
  } else {
    addLines([{ type: 'err', text: 'zsh: command not found: ' + cmd }]);
  }
}

cmdInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    runCommand(cmdInput.value);
    cmdInput.value = '';
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx > 0) {
      histIdx--;
      cmdInput.value = cmdHistory[histIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) {
      histIdx++;
      cmdInput.value = cmdHistory[histIdx];
    } else {
      histIdx = cmdHistory.length;
      cmdInput.value = '';
    }
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    while (output.firstChild) output.removeChild(output.firstChild);
  }
});

document.addEventListener('click', function(e) {
  if (e.target.tagName !== 'A' && !e.target.classList.contains('line-link')) {
    cmdInput.focus();
  }
});

// Matrix rain
var canvas = document.getElementById('matrix');
var ctx = canvas.getContext('2d');
var matrixActive = false;
var matrixAnim;

function startMatrix() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.classList.add('active');
  matrixActive = true;

  var cols = Math.floor(canvas.width / 16);
  var drops = [];
  for (var i = 0; i < cols; i++) drops[i] = 1;
  var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'.split('');

  function draw() {
    ctx.fillStyle = 'rgba(21, 21, 21, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#6aaa7a';
    ctx.font = '14px JetBrains Mono';

    for (var i = 0; i < drops.length; i++) {
      var text = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(text, i * 16, drops[i] * 16);
      if (drops[i] * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    matrixAnim = requestAnimationFrame(draw);
  }
  draw();

  function stopMatrix() {
    if (matrixActive) {
      matrixActive = false;
      cancelAnimationFrame(matrixAnim);
      canvas.classList.remove('active');
      document.removeEventListener('click', stopMatrix);
      cmdInput.focus();
    }
  }
  setTimeout(function() { document.addEventListener('click', stopMatrix); }, 100);
}

// Boot message
addLines([
  { type: 'muted', text: 'Last login: ' + new Date().toLocaleString('en-GB', { timeZone: 'Europe/London' }) + ' on ttys000' },
  { type: 'out', text: '' },
  { type: 'heading', text: 'Welcome to daftscientist.dev/terminal' },
  { type: 'out', text: '' },
  { type: 'out', text: 'This is a fake terminal. Explore my portfolio from the command line.' },
  { type: 'out', text: 'Type `help` to see available commands.' },
  { type: 'out', text: '' },
]);
cmdInput.focus();
</script>
</body>
</html>
